<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHUNVAN GROUP | Architectural Portfolio</title>
    <meta name="description" content="Modern minimalist architectural portfolio for Shunvan Group. From vision to reality.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="loader">
        <div class="logo-container">
            <!-- SVG recreation of Shunvan Group logo concept -->
            <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle class="logo-circle" cx="50" cy="50" r="40" stroke="var(--color-dark)" stroke-width="2"/>
                <path class="logo-sun" d="M50 20 L50 30 M80 50 L70 50 M50 80 L50 70 M20 50 L30 50 M28.7 28.7 L35.8 35.8 M71.3 28.7 L64.2 35.8 M71.3 71.3 L64.2 64.2 M28.7 71.3 L35.8 64.2" stroke="var(--color-dark)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="10" fill="var(--color-dark)"/>
            </svg>
            <div class="logo-text">
                <h1>SHUNVAN GROUP</h1>
                <p>FROM VISION TO REALITY</p>
            </div>
        </div>
    </div>

    <main class="main-content" id="scroll-container">
        <section class="hero">
            <div class="hero-sticky">
                <div class="hero-content">
                    <div class="hero-logo-circle">
                        <img src="assets/images/profile-logo.png" alt="Shunvan Group Logo">
                    </div>
                    <h2 class="hero-title">Shaping Modernity</h2>
                    <p class="hero-subtitle">Architecture that breathes, spaces that inspire.</p>
                </div>
                <div class="scroll-indicator">
                    <span>Scroll to explore</span>
                    <div class="line"></div>
                </div>
            </div>
        </section>

        <section class="modules">
            <div class="modules-grid">
                
                <!-- LIGHT MODULE -->
                <div class="module-item" id="module-light">
                    <div class="module-image-container">
                        <img src="assets/images/LIGHT.png" alt="Light Architectural Design" class="module-image">
                        <div class="image-overlay"></div>
                    </div>
                    <button class="module-btn">
                        <span class="btn-text">LIGHT</span>
                        <div class="btn-bg"></div>
                    </button>
                </div>

                <!-- PRODUCT MODULE -->
                <div class="module-item" id="module-product">
                    <div class="module-image-container">
                        <img src="assets/images/PRODUCT.png" alt="Product Architectural Design" class="module-image">
                        <div class="image-overlay"></div>
                    </div>
                    <button class="module-btn">
                        <span class="btn-text">PRODUCT</span>
                        <div class="btn-bg"></div>
                    </button>
                </div>

                <!-- DESIGN MODULE -->
                <div class="module-item" id="module-design">
                    <div class="module-image-container">
                        <img src="assets/images/DESIGN.png" alt="Exterior Architectural Design" class="module-image">
                        <div class="image-overlay"></div>
                    </div>
                    <button class="module-btn">
                        <span class="btn-text">DESIGN</span>
                        <div class="btn-bg"></div>
                    </button>
                </div>

            </div>
        </section>
        
        <footer class="footer">
            <p>&copy; 2026 SHUNVAN GROUP. All rights reserved.</p>
        </footer>
    </main>

    <!-- Product Overlay Section -->
    <section id="product-overlay" class="fullscreen-overlay">
        <div class="overlay-bg-container">
            <img src="assets/images/module_product.png" alt="Product Hero" id="active-product-bg">
            <div class="overlay-gradient"></div>
        </div>
        
        <div class="overlay-header">
            <button class="back-btn" id="close-product-btn">
                <span>←</span> BACK TO MAIN
            </button>
            <div class="project-title-container">
                <h3 id="active-project-title">Product Design Overview</h3>
            </div>
        </div>

        <div class="gallery-container">
            <p class="gallery-label">RELATED PROJECTS</p>
            <div class="gallery-track" id="product-gallery">
                <!-- Gallery items will be injected by JS -->
            </div>
        </div>
    </section>

    <!-- GSAP & Lenis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
